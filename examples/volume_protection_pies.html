<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volume Protection Status</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #FFF8EE;
    color: #3C3C3B;
    padding: 40px;
  }

  .header {
    margin-bottom: 32px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .header p {
    font-size: 14px;
    color: #6B7D6B;
  }

  .legend {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
    font-size: 13px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .legend-swatch {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.1);
  }

  .swatch-green { background: #6AAF5C; }
  .swatch-yellow { background: #E8B830; }
  .swatch-red { background: #CC4444; }

  .charts {
    display: flex;
    gap: 48px;
    flex-wrap: wrap;
  }

  .chart-card {
    background: #fff;
    border-radius: 12px;
    padding: 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 320px;
  }

  .chart-card h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .chart-card .subtitle {
    font-size: 12px;
    color: #6B7D6B;
    margin-bottom: 20px;
  }

  .pie-container {
    position: relative;
    width: 220px;
    height: 220px;
    margin-bottom: 24px;
  }

  .pie-container svg {
    transform: rotate(-90deg);
  }

  .pie-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .pie-center .pct {
    font-size: 32px;
    font-weight: 700;
  }

  .pie-center .pct-label {
    font-size: 11px;
    color: #6B7D6B;
  }

  .breakdown {
    width: 100%;
  }

  .breakdown-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #F0ECE4;
    font-size: 13px;
  }

  .breakdown-row:last-child {
    border-bottom: none;
  }

  .breakdown-label {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .breakdown-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .breakdown-value {
    font-weight: 700;
  }

  .dot-green { background: #6AAF5C; }
  .dot-yellow { background: #E8B830; }
  .dot-red { background: #CC4444; }
</style>
</head>
<body>

<div class="header">
  <h1>Volume Protection Status</h1>
  <p>Data collected March 31, 2026</p>
</div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-swatch swatch-green"></div>
    <span>Ratcheted PGroup (Protected)</span>
  </div>
  <div class="legend-item">
    <div class="legend-swatch swatch-yellow"></div>
    <span>Unlocked PGroup (At Risk)</span>
  </div>
  <div class="legend-item">
    <div class="legend-swatch swatch-red"></div>
    <span>No Protection Group (Critical)</span>
  </div>
</div>

<div class="charts" id="charts"></div>

<script>
const arrays = [
  {
    name: "ashbpasan001",
    subtitle: "87 volumes  |  203.88 TB capacity",
    ratcheted: 8,
    unlocked: 10,
    unprotected: 69
  },
  {
    name: "utilidor",
    subtitle: "— volumes  |  — capacity",
    ratcheted: 0,
    unlocked: 0,
    unprotected: 0
    // We only have pgroup data, no volume list yet
  }
];

// Only render arrays with volume data
const renderArrays = arrays.filter(a => a.ratcheted + a.unlocked + a.unprotected > 0);

function createPieSlice(cx, cy, r, startAngle, endAngle, color) {
  if (endAngle - startAngle >= 2 * Math.PI) {
    // Full circle
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" />`;
  }
  const x1 = cx + r * Math.cos(startAngle);
  const y1 = cy + r * Math.sin(startAngle);
  const x2 = cx + r * Math.cos(endAngle);
  const y2 = cy + r * Math.sin(endAngle);
  const largeArc = endAngle - startAngle > Math.PI ? 1 : 0;
  return `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${color}" />`;
}

function renderChart(array) {
  const total = array.ratcheted + array.unlocked + array.unprotected;
  const protectedPct = total > 0 ? Math.round((array.ratcheted / total) * 100) : 0;

  const colors = ['#6AAF5C', '#E8B830', '#CC4444'];
  const values = [array.ratcheted, array.unlocked, array.unprotected];
  const labels = ['Ratcheted (Protected)', 'Unlocked PGroup (At Risk)', 'No PGroup (Critical)'];
  const dotClasses = ['dot-green', 'dot-yellow', 'dot-red'];

  const cx = 110, cy = 110, r = 100;
  let slices = '';
  let currentAngle = 0;

  for (let i = 0; i < values.length; i++) {
    if (values[i] === 0) continue;
    const sliceAngle = (values[i] / total) * 2 * Math.PI;
    slices += createPieSlice(cx, cy, r, currentAngle, currentAngle + sliceAngle, colors[i]);
    currentAngle += sliceAngle;
  }

  let breakdownRows = '';
  for (let i = 0; i < values.length; i++) {
    const pct = total > 0 ? Math.round((values[i] / total) * 100) : 0;
    breakdownRows += `
      <div class="breakdown-row">
        <div class="breakdown-label">
          <div class="breakdown-dot ${dotClasses[i]}"></div>
          <span>${labels[i]}</span>
        </div>
        <div class="breakdown-value">${values[i]} (${pct}%)</div>
      </div>`;
  }

  return `
    <div class="chart-card">
      <h2>${array.name}</h2>
      <div class="subtitle">${array.subtitle}</div>
      <div class="pie-container">
        <svg width="220" height="220" viewBox="0 0 220 220">
          ${slices}
          <circle cx="110" cy="110" r="55" fill="#fff" />
        </svg>
        <div class="pie-center">
          <div class="pct" style="color: ${protectedPct >= 80 ? '#6AAF5C' : protectedPct >= 50 ? '#E8B830' : '#CC4444'}">${protectedPct}%</div>
          <div class="pct-label">protected</div>
        </div>
      </div>
      <div class="breakdown">
        ${breakdownRows}
        <div class="breakdown-row" style="border-top: 2px solid #3C3C3B; margin-top: 4px; padding-top: 10px;">
          <div class="breakdown-label"><span style="font-weight:700;">Total</span></div>
          <div class="breakdown-value">${total}</div>
        </div>
      </div>
    </div>`;
}

document.getElementById('charts').innerHTML = renderArrays.map(renderChart).join('');
</script>

</body>
</html>
